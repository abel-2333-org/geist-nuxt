# Source-first verification and skill distribution.
#
# The repository root is both the runnable Nuxt gallery and the v0 preview
# snapshot. There is no npm publish, registry-visibility wait, workspace package,
# or standalone starter. A release contains a clean, runnable root snapshot.

name: skill

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-source:
    name: Verify Source-first root and consumer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate registry contract
        run: pnpm registry:validate

      - name: Test registry operations
        run: pnpm test:registry

      - name: Typecheck root gallery
        run: pnpm typecheck

      - name: Build root gallery
        run: pnpm build

      - name: Build a registry-installed consumer
        run: pnpm test:consumer

  release-skill:
    name: Assemble, verify and release Source-first snapshot
    needs: verify-source
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Assemble runnable root snapshot
        run: |
          TAG="skill-v$(date -u +%Y%m%d-%H%M)"
          printf '%s\n' "$TAG" > RELEASE
          mkdir -p dist-skill
          rsync -a ./ dist-skill/ \
            --exclude .git \
            --exclude dist-skill \
            --exclude node_modules \
            --exclude .nuxt \
            --exclude .output \
            --exclude coverage \
            --exclude '*.log'
          echo "tag=$TAG" >> "$GITHUB_ENV"
          echo "--- dist-skill contents ---"
          find dist-skill -type f | sort

      - name: Guard against mojibake (U+FFFD)
        run: |
          # UTF-8 replacement bytes EF BF BD mean a writer corrupted source text.
          # The root snapshot feeds every v0 memory area, so fail before release.
          if LC_ALL=C grep -rlaF $'\xEF\xBF\xBD' dist-skill; then
            echo "::error::Found U+FFFD (mojibake) in dist-skill. Fix the source before release." >&2
            echo "--- offending lines ---" >&2
            LC_ALL=C grep -rnaF $'\xEF\xBF\xBD' dist-skill >&2 || true
            exit 1
          fi
          echo "No U+FFFD found — distribution encoding is clean."

      - name: Install assembled snapshot
        working-directory: dist-skill
        run: pnpm install --frozen-lockfile

      - name: Typecheck assembled snapshot
        working-directory: dist-skill
        run: pnpm typecheck

      - name: Build assembled snapshot
        working-directory: dist-skill
        run: pnpm build

      - name: Pack and release snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar czf dist-skill.tar.gz -C dist-skill .
          gh release create "$TAG" dist-skill.tar.gz \
            --title "$TAG" \
            --notes "Source-first geist-nuxt skill distribution. The asset is a runnable root gallery/v0 snapshot with foundation, kits, registry tools and references. Sync by overwriting the memory-area skill directory wholesale."
          echo "Released $TAG"
