# skill.yml — the single pipeline that turns this repo into its two products:
#   1. npm package @geist-nuxt/core (published when its version changes)
#   2. dist-skill release (the v0 skill distribution: docs + self-contained starter)
#
# Sync flow for v0 memory areas: download the dist-skill asset from the latest
# `skill-v*` release and overwrite the skill directory wholesale. No per-file
# reconciliation. See references/maintenance/sync.md.
#
# If the publish step fails with 401/403: the NPM_TOKEN secret is missing,
# expired, or lacks read-write on the @geist-nuxt scope. Generate a new
# granular token on npmjs.com and update the repo secret.

name: skill

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-core:
    name: Publish @geist-nuxt/core (if version is new)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Read core version
        id: meta
        run: echo "version=$(node -p "require('./packages/core/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish if version not on npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          V="${{ steps.meta.outputs.version }}"
          if npm view "@geist-nuxt/core@$V" version >/dev/null 2>&1; then
            echo "@geist-nuxt/core@$V already published — skipping."
          else
            echo "Publishing @geist-nuxt/core@$V ..."
            cd packages/core
            # core ships as source (Nuxt layer); skip the `prepare: nuxt prepare`
            # lifecycle so publish doesn't need the toolchain/deps installed.
            pnpm publish --access public --no-git-checks --ignore-scripts
          fi

  verify-starter:
    name: Starter boot verification (the v0-preview guarantee)
    needs: publish-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait for core version on npm registry
        run: |
          V="${{ needs.publish-core.outputs.version }}"
          for i in 1 2 3 4 5; do
            if npm view "@geist-nuxt/core@$V" version >/dev/null 2>&1; then
              echo "core@$V visible on registry."
              exit 0
            fi
            echo "core@$V not visible yet, retry $i/5 ..."
            sleep 20
          done
          echo "core@$V never appeared on the registry." >&2
          exit 1

      # starter/ lives inside the repo (which has a root pnpm-workspace.yaml), but
      # in v0 it is cloned as a STANDALONE project with no parent workspace. We must
      # reproduce that here with --ignore-workspace, otherwise pnpm hoists deps to the
      # repo root and the starter's own node_modules stays empty (nuxt: not found).
      - name: Generate starter lockfile
        working-directory: starter
        run: pnpm install --lockfile-only --ignore-workspace

      - name: Real install + build (must succeed or the skill is broken)
        working-directory: starter
        run: |
          pnpm install --frozen-lockfile --ignore-workspace
          pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: starter-lockfile
          path: starter/pnpm-lock.yaml
          retention-days: 7

  release-skill:
    name: Assemble dist-skill and tag a release
    needs: [publish-core, verify-starter]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: starter-lockfile
          path: starter/

      - name: Assemble dist-skill
        run: |
          mkdir -p dist-skill
          cp SKILL.md README.md AGENTS.md v0.json dist-skill/
          cp -r references dist-skill/references
          mkdir -p dist-skill/starter
          # Starter ships source + CI-generated lockfile only; never node_modules/.nuxt.
          rsync -a --exclude node_modules --exclude .nuxt --exclude .output starter/ dist-skill/starter/
          # Kits ship as source for registry-slice copy-in (see packages/kits/*/registry.json).
          # Kept under packages/kits/ so every docs pointer resolves identically in repo and memory area.
          mkdir -p dist-skill/packages/kits
          rsync -a --exclude node_modules --exclude .nuxt --exclude .output packages/kits/ dist-skill/packages/kits/
          echo "--- dist-skill contents ---"
          find dist-skill -type f | sort

      - name: Create release with dist-skill asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="skill-v$(date -u +%Y%m%d-%H%M)"
          CORE_V="${{ needs.publish-core.outputs.version }}"
          tar czf dist-skill.tar.gz -C dist-skill .
          gh release create "$TAG" dist-skill.tar.gz \
            --title "$TAG" \
            --notes "v0 skill distribution. Pinned @geist-nuxt/core: $CORE_V. Sync = download dist-skill.tar.gz and overwrite the memory-area skill directory wholesale."
          echo "Released $TAG (core $CORE_V)"
