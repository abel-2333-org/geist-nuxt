# Source-first verification and skill distribution.
#
# The repository root is both the runnable Nuxt gallery and the v0 preview
# snapshot. There is no npm publish, registry-visibility wait, workspace package,
# or standalone starter. A release contains a clean, runnable root snapshot.

name: skill

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify-root:
    name: Verify Source-first root
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Guard against mojibake (U+FFFD)
        run: |
          # Same gate as release-skill, but here it runs on every PR so the
          # corruption is caught at review time instead of at release time
          # (release-skill is skipped for pull_request events).
          if LC_ALL=C grep -rlaF $'\xEF\xBF\xBD' . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.nuxt --exclude-dir=.output --exclude-dir=coverage; then
            echo "::error::Found U+FFFD (mojibake) in the source tree. Fix before merge." >&2
            echo "--- offending lines ---" >&2
            LC_ALL=C grep -rnaF $'\xEF\xBF\xBD' . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.nuxt --exclude-dir=.output --exclude-dir=coverage >&2 || true
            exit 1
          fi
          echo "No U+FFFD found — source encoding is clean."

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate registry contract
        run: pnpm registry:validate

      - name: Test registry operations
        run: pnpm test:registry

      - name: Test API Docs components
        run: pnpm test:component

      - name: Typecheck root gallery
        run: pnpm typecheck

      - name: Build root gallery
        run: pnpm build

  verify-consumer:
    name: Verify consumer (${{ matrix.group }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [runtime, isolated]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Test registry consumer (${{ matrix.group }})
        run: pnpm test:consumer -- --group ${{ matrix.group }}

  release-skill:
    name: Assemble, verify and release Source-first snapshot
    needs: [verify-root, verify-consumer]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Assemble runnable root snapshot
        run: |
          TAG="skill-v$(date -u +%Y%m%d-%H%M%S)-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p dist-skill
          rsync -a ./ dist-skill/ \
            --exclude .git \
            --exclude dist-skill \
            --exclude dist-verify \
            --exclude node_modules \
            --exclude .nuxt \
            --exclude .output \
            --exclude coverage \
            --exclude '*.log'
          printf '%s\n' "$TAG" > dist-skill/RELEASE
          printf '{"schemaVersion":1,"sourceSha":"%s"}\n' "$GITHUB_SHA" > dist-skill/.geist-source.json
          rsync -a dist-skill/ dist-verify/
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "--- dist-skill contents ---"
          find dist-skill -type f | sort

      - name: Guard against mojibake (U+FFFD)
        run: |
          # UTF-8 replacement bytes EF BF BD mean a writer corrupted source text.
          # The root snapshot feeds every v0 memory area, so fail before release.
          if LC_ALL=C grep -rlaF $'\xEF\xBF\xBD' dist-skill; then
            echo "::error::Found U+FFFD (mojibake) in dist-skill. Fix the source before release." >&2
            echo "--- offending lines ---" >&2
            LC_ALL=C grep -rnaF $'\xEF\xBF\xBD' dist-skill >&2 || true
            exit 1
          fi
          echo "No U+FFFD found — distribution encoding is clean."

      - name: Install assembled snapshot
        working-directory: dist-verify
        run: pnpm install --frozen-lockfile

      - name: Validate assembled registry contract
        working-directory: dist-verify
        run: |
          pnpm registry:validate
          pnpm test:registry

      - name: Test assembled API Docs components
        working-directory: dist-verify
        run: pnpm test:component

      - name: Typecheck assembled snapshot
        working-directory: dist-verify
        run: pnpm typecheck

      - name: Build assembled snapshot
        working-directory: dist-verify
        run: pnpm build

      - name: Verify exact-SHA registry flow without Git metadata
        working-directory: dist-verify
        run: |
          CONSUMER_DIR="$(mktemp -d)"
          cp -R tests/fixtures/consumer/. "$CONSUMER_DIR/"
          pnpm geist:copy -- geist-foundation \
            --target "$CONSUMER_DIR" \
            --to "$GITHUB_SHA"
          pnpm geist:copy -- geist-foundation \
            --target "$CONSUMER_DIR" \
            --to "$GITHUB_SHA" \
            --write
          pnpm geist:check -- --target "$CONSUMER_DIR"

      - name: Pack and guard clean snapshot
        run: |
          node --input-type=module -e '
            import { readFileSync } from "node:fs"
            const stamp = JSON.parse(readFileSync("dist-skill/.geist-source.json", "utf8"))
            if (stamp.schemaVersion !== 1 || stamp.sourceSha !== process.env.GITHUB_SHA) {
              throw new Error("Invalid .geist-source.json")
            }
          '
          tar czf dist-skill.tar.gz -C dist-skill .
          if tar tzf dist-skill.tar.gz | grep -E '(^|/)(\.git|node_modules|\.nuxt|\.output|coverage)(/|$)|\.log$'; then
            echo "::error::Generated or repository-private files leaked into dist-skill.tar.gz." >&2
            exit 1
          fi
          echo "Archive is source-only and generated-file free."

      - name: Release snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          : "${TAG:?TAG is required}"
          gh release create "$TAG" dist-skill.tar.gz \
            --title "$TAG" \
            --notes "Source-first geist-nuxt skill distribution. The asset is a runnable root gallery/v0 snapshot with foundation, kits, registry tools and references. Sync by overwriting the memory-area skill directory wholesale."
          echo "Released $TAG"
