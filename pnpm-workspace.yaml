# starter is intentionally NOT a workspace member: it depends on the published
# @geist-nuxt/core from npm (never workspace:*), so it stays a self-contained
# project that boots anywhere with a plain `pnpm install` — including v0
# session previews. Its lockfile is generated by CI, not by the workspace.
packages:
  - 'packages/*'
  - 'packages/kits/*'
  - 'apps/*'
